# Alembic configuration for HK IPO Cornerstone Agent.
# See PROJECT_SPEC.md sec 3.4 and docs/decisions/0006-phased-orm-rollout.md.
#
# Run from repo root:
#   uv run alembic -c src/hk_ipo_agent/data/migrations/alembic.ini upgrade head
#   uv run alembic -c src/hk_ipo_agent/data/migrations/alembic.ini revision --autogenerate -m "msg"
#
# The actual DB URL is resolved in env.py from Settings (env / .env / yaml).

[alembic]
script_location = %(here)s
prepend_sys_path = %(here)s

# Path to migration scripts (relative to script_location)
version_locations = %(here)s/versions

# Timestamp filename template
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# UTC timestamps in revision metadata
timezone = UTC

# Max length of generated slug part of revision filename
truncate_slug_length = 40

# Placeholder URL - env.py overrides this from project Settings.
sqlalchemy.url = driver://user:pass@host/db

[post_write_hooks]
# Disabled: ruff is invoked via uv run in CI / make; cannot find as console_scripts
# entrypoint inside the uv-managed venv reliably across platforms.
hooks =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
