# NACS 项目 pre-commit hooks
#
# 安装:
#   pip install pre-commit
#   pre-commit install
#
# 手动跑全仓:
#   pre-commit run --all-files
#
# 临时绕过 (慎用):
#   git commit --no-verify
#
# 升级 hooks 到最新版:
#   pre-commit autoupdate

default_language_version:
  python: python3

# 默认仅对修改的文件跑; ruff/black 用 pass_filenames
default_stages: [pre-commit]

repos:
  # -------------------------------------------------------------------
  # 通用清理 (官方 hooks)
  # -------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(data/raw|outputs|reports|themes|\.gitignore$)
      - id: end-of-file-fixer
        exclude: ^(data/raw|outputs|reports|themes)
      - id: check-yaml
        exclude: ^themes/   # 一些主题 yaml 用了非标语法
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=2000"]   # SQLite >2MB 不该入仓
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # -------------------------------------------------------------------
  # ruff - lint + import sort (pyupgrade/bugbear in select)
  # 配置在 pyproject.toml::tool.ruff
  # -------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]   # 自动修可修的
      # ruff format 不开 (避免与 black 冲突, 二选一)

  # -------------------------------------------------------------------
  # black - 代码格式化
  # 配置在 pyproject.toml::tool.black
  # -------------------------------------------------------------------
  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        language_version: python3

  # -------------------------------------------------------------------
  # mypy - 静态类型 (仅 src/, ignore-missing-imports)
  # 配置在 pyproject.toml::tool.mypy
  # 注: 大型代码库初次跑会有大量类型问题, 默认 manual stage 不阻塞 commit
  # 想强制开启请改为 [pre-commit]
  # -------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies: [types-requests]
        stages: [manual]   # 改为 [pre-commit] 即开启强制

  # -------------------------------------------------------------------
  # 数据完整性 - 自定义 local hook (no network)
  # -------------------------------------------------------------------
  - repo: local
    hooks:
      - id: nacs-config-validate
        name: NACS config validate (configs/*.yaml)
        entry: python -c "from src.config import load_config; import sys; [load_config(p) for p in sys.argv[1:]]"
        language: system
        files: ^configs/.*\.ya?ml$
        pass_filenames: true
