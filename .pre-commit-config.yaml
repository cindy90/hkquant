# Pre-commit hooks for HK IPO Cornerstone Agent.
#
# Install:
#   uv tool install pre-commit
#   pre-commit install
#
# Run all hooks across the repo:
#   pre-commit run --all-files
#
# Bypass (use sparingly):
#   git commit --no-verify
#
# See PROJECT_SPEC.md §10.5.

default_language_version:
  python: python3.11
default_stages: [pre-commit]

repos:
  # ---------------- General hygiene ----------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(data/raw|data/processed|data/derived|outputs|reports|themes|legacy|new_project_spec|PROJECT_SPEC\.md|PROJECT_SPEC_UI\.md|\.gitignore$)
      - id: end-of-file-fixer
        exclude: ^(data/raw|data/processed|data/derived|outputs|reports|themes|legacy|new_project_spec)
      - id: check-yaml
        exclude: ^(themes/)
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=2000"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ---------------- ruff: lint + format ----------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # ---------------- mypy: strict on new package ----------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^src/hk_ipo_agent/
        additional_dependencies:
          - pydantic>=2.7
          - types-pyyaml
          - types-python-dateutil
        stages: [manual]   # opt-in for now; flip to [pre-commit] once Phase 1 typing is stable

  # ---------------- Secrets scan ----------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: ^(\.env\.example|tests/fixtures/|PROJECT_SPEC\.md|PROJECT_SPEC_UI\.md|new_project_spec/)
