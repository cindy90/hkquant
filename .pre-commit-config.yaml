# Pre-commit hooks for HK IPO Cornerstone Agent.
#
# Install:
#   uv tool install pre-commit
#   pre-commit install
#
# Run all hooks across the repo:
#   pre-commit run --all-files
#
# Bypass (use sparingly):
#   git commit --no-verify
#
# See PROJECT_SPEC.md §10.5.

default_language_version:
  # 不锁死具体小版本，让本地 (Win/3.12/3.13) 和 CI (3.11) 都能起 hook env。
  # CI 上 ci.yml 显式 `uv python install 3.11` 仍保证 lint job 跑在 3.11。
  python: python3
default_stages: [pre-commit]

repos:
  # ---------------- General hygiene ----------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(data/raw|data/processed|data/derived|outputs|reports|themes|legacy|new_project_spec|PROJECT_SPEC\.md|PROJECT_SPEC_UI\.md|\.gitignore$)
      - id: end-of-file-fixer
        exclude: ^(data/raw|data/processed|data/derived|outputs|reports|themes|legacy|new_project_spec)
      - id: check-yaml
        exclude: ^(themes/)
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=2000"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ---------------- ruff: lint + format ----------------
  # rev pinned to match `uv sync`-installed ruff (>= 0.15). Older revs
  # have different format preferences (e.g. assert-wrap style) that
  # bounce-reformat output from the newer CLI ruff.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # ---------------- mypy: opt-in (manual) ----------------
  # R10-11 attempted to flip this to default `[pre-commit]` so new commits
  # would get typing checks, but `pre-commit run --all-files` in CI then
  # surfaced 113 pre-existing mypy errors across 44 files. The 6-file
  # exclude list was a drop in the bucket; the realistic fix is a full
  # typing pass under R11. Until then mypy stays at `[manual]` and the
  # advisory CI typecheck job remains the all-files gate.
  #
  # To run mypy locally:
  #   uv run pre-commit run mypy --all-files --hook-stage manual
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        stages: [manual]
        files: ^src/hk_ipo_agent/
        additional_dependencies:
          - pydantic>=2.7
          - types-pyyaml
          - types-python-dateutil

  # ---------------- Secrets scan ----------------
  # exclude rationale: known fixture/migration areas where detect-secrets
  # heuristics fire on dev-mode password literals or hex revision hashes.
  # These are NOT real secrets and never will be — true secrets always
  # live in .env / settings.py SecretStr fields, both of which are scanned.
  # New file additions outside these excludes still go through baseline check.
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: |
          (?x)^(
            \.env\.example
            | tests/fixtures/
            | PROJECT_SPEC\.md
            | PROJECT_SPEC_UI\.md
            | new_project_spec/
            | \.github/workflows/ci\.yml
            | src/hk_ipo_agent/data/migrations/versions/.*\.py
            | src/hk_ipo_agent/api/auth/dependencies\.py
          )
