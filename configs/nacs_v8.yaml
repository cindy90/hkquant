# NACS v8 生产配置 — 与 src/nacs_model.py 原硬编码值完全一致
#
# 修改任何参数后:
#   1. python check_health.py            # 应仍通过
#   2. python run_v7_backtest.py         # 对比 IC 变化
#   3. 留 manifest 在 outputs/{run_id}/  以便复现
#
# 版本沿革:
#   v7 -> v8: position_bands 中 RELATIONSHIP 仓位 0.15 → 0.00 (砍死亡区间)
#             数据支撑: production 60d mean +17%→+37%, win 55%→78%

version: v8

# -----------------------------------------------------------------------------
# v7 制度门控
# -----------------------------------------------------------------------------
# regime_score = 过去 [t-lookback_days, t-min_lag_days] 上市 IPO 的 30 日中位收益
# 数据支撑: regime>=threshold 子样本主板 60d IC 从 +0.09 → +0.245, t 从 0.26 → 2.41
regime_gate:
  threshold: 0.0
  lookback_days: 120
  min_lag_days: 30
  min_sample: 5

# -----------------------------------------------------------------------------
# v7 簇基石加成 (cluster bonus)
# -----------------------------------------------------------------------------
# 同 ultimate_holder ≥threshold 个基石时, Q_ecosystem ×multiplier
# 数据支撑: cluster≥2 IPO 60d mean +22%, std 40% (vs 无关联 mean +14%, std 68%)
# 注意: 必须按 threshold 降序排列
cluster_bonus:
  - {threshold: 5, multiplier: 1.20}
  - {threshold: 3, multiplier: 1.15}
  - {threshold: 2, multiplier: 1.10}

# -----------------------------------------------------------------------------
# v8 仓位映射 (NACS_adj → position_pct + decision)
# -----------------------------------------------------------------------------
# 必须按 min_nacs 降序; 第一个匹配的档位生效
# v8 关键: RELATIONSHIP 区间 [0.25, 0.35) 仓位归零, 仅保留诊断标签
position_bands:
  - {min_nacs: 0.55, position: 1.00, decision: FULL}
  - {min_nacs: 0.45, position: 0.70, decision: LARGE}
  - {min_nacs: 0.35, position: 0.40, decision: TRIAL}
  - {min_nacs: 0.25, position: 0.00, decision: RELATIONSHIP}
  - {min_nacs: 0.00, position: 0.00, decision: SKIP}

# -----------------------------------------------------------------------------
# Layer 1 (Q_company) 6 子项权重 — 求和必须 = 1.0
# -----------------------------------------------------------------------------
layer1_weights:
  valuation: 0.25       # PE 折价 + Pre-IPO 最后一轮溢价
  sponsor: 0.15         # 保荐人画像
  fundamentals: 0.25    # 基本面 (按章节分流: profitable/biotech/18c)
  offering: 0.15        # 发行结构 (国际/公开倍数/绿鞋/规模)
  chapter: 0.10         # 上市章节制度路径
  market: 0.10          # 市场环境 (HSI 动量/波动/南向)

# -----------------------------------------------------------------------------
# Layer 2 (Q_ecosystem) 7 子项权重 — 求和必须 = 1.0
# -----------------------------------------------------------------------------
layer2_weights:
  q_weighted: 0.30      # 加权基石质量分
  coverage: 0.15        # 基石覆盖率
  hhi: 0.10             # 集中度
  diversity: 0.10       # 类型多样性 (Shannon 熵)
  pollution: 0.20       # 关联污染率
  synergy: 0.10         # 战略协同 (产业资本)
  zucou: 0.05           # 中资凑数红旗

# -----------------------------------------------------------------------------
# Layer 3 (R_lockup) 6 子项权重 — 求和必须 = 1.0
# -----------------------------------------------------------------------------
layer3_weights:
  vol: 0.30
  val_reversal: 0.20
  overhang: 0.15
  fundamental: 0.15
  macro: 0.10
  peer: 0.10

# -----------------------------------------------------------------------------
# Layer 1 否决条款
# -----------------------------------------------------------------------------
layer1_vetoes:
  intl_oversub_min: 1.5             # 国际配售 < 此值 → 否决
  last_round_premium_max: 0.50      # Pre-IPO 溢价 > 此值 → 否决
  auditor_tier_max_allowed: 2       # 审计师 tier > 此值 → 否决
  veto_score_cap: 40.0              # 否决后 raw 分压顶值

# -----------------------------------------------------------------------------
# Layer 2 否决条款
# -----------------------------------------------------------------------------
layer2_vetoes:
  affiliation_pct_max: 0.50         # 关联污染率 > 此值 → 否决
  affiliation_score_cap: 30.0
  q_weighted_min: 30.0              # 加权基石质量 < 此值 → 否决
  q_weighted_score_cap: 40.0
  small_cs_count_threshold: 3       # 基石数 < 此值且
  small_cs_max_share: 0.60          # 最大单一占比 > 此值 → 否决
  small_cs_score_cap: 35.0

# -----------------------------------------------------------------------------
# compute_nacs 后处理乘子
# -----------------------------------------------------------------------------
post_adjustments:
  chapter_18c: 0.70                 # 18C 章节折扣
  a_plus_h_short_borrowable: 1.10   # A+H 同名 A 股可融券对冲加成
  secondary_listing: 0.85           # 第二上市折扣
  related_party_tx_recent: 0.85     # 控股股东近 12 月重大关联交易折扣
  # P0.2: AI 镀金 post-adjustment
  # 触发条件: theme_id ∈ ai_themes 且 ai_revenue_pct < threshold
  # 设计依据: nacs_checklist v3 VIII 区 "AI 镀金检测器" — 防止"贴 AI 标签
  # 但实际 AI 业务<10%"的 IPO 拿过高仓位 (典型情况: 公司主营硬件/制造,
  # 招股书把 AI 概念放头版以拉高估值)
  ai_gilding:
    enabled: true
    ai_themes:                      # 视为"AI 镀金风险" 的主题集
      - ai_server
      - llm
      - ai_application
      - humanoid_robot
      - ai_driving
      - semi_localization
    threshold: 0.10                 # AI 收入占比 < 10% 触发
    multiplier: 0.85
  # P2.1: A+H 套利乘子按 A 股 ADV 分档 (替代 a_plus_h_short_borrowable 静态 1.10)
  # 触发条件: is_a_h=true AND a_share_short_borrowable=true 时进入 ah_hedge 分桶
  # 设计依据: 旧 ×1.10 把所有 A+H 一视同仁, 但 A 股流动性差距巨大:
  #   00939.HK 建行 A 股 ADV >5B CNY, 对冲畅通 → 给 ×1.10
  #   01357.HK 美图 A 股 ADV ~30M CNY, 借券贵 → 给 ×1.00 (不该奖励)
  #   中间档 (50M~200M) 给 ×1.05 折中
  ah_hedge:
    enabled: true
    high_threshold_cny: 200_000_000     # 200M CNY
    high_multiplier: 1.10
    mid_threshold_cny: 50_000_000       # 50M CNY
    mid_multiplier: 1.05
    low_multiplier: 1.00
    fallback_multiplier: 1.10           # ADV 未知时沿用旧行为

# -----------------------------------------------------------------------------
# L1.6 主题情绪 modifier (P0.1, 接 themes/heat_today.json)
# -----------------------------------------------------------------------------
# deal 经 classify_deal_to_theme 命中主题后, 把当日 heat_score 注入 IPOOffering;
# _score_l1_6_market 在 5 项市场环境基础上加这个 modifier.
#
# 阈值参考 nacs_checklist v3 的实证规则:
#   heat ≥80 → overheated, 锁定期反转风险
#   heat <40 → trough, 主题谷底入场窗口
#
# 调试: 设 enabled=false 临时禁用, 不需重启即可 A/B 对比
layer1_market_theme_heat:
  enabled: true
  overheated_threshold: 80          # heat ≥ → 罚分
  overheated_penalty: -5.0
  trough_threshold: 40              # heat < → 加分
  trough_bonus: 3.0

# -----------------------------------------------------------------------------
# L1.4 发行结构: 总市值分桶 modifier (P1.1)
# -----------------------------------------------------------------------------
# 在原 6 子项 (range/intl/public/clawback/greenshoe/size) = 100 分基础上加 modifier.
# size_score 看的是"募资额", 本 modifier 看"总市值" — 二者独立 (一只小公司可以
# 募资额很大占比超 50%, 也可以是大公司只融资很小一笔).
#
# 实证依据:
#   小盘 (<5B HKD): 流动性陷阱风险, 锁定期内大单进出可能砸盘
#   巨型盘 (>500B HKD): 主要是央企 / A 股已上市的回港 IPO, d30 涨幅历来很低
layer1_offering_mkt_cap:
  enabled: true
  small_cap_threshold_hkd: 5_000_000_000     # 5B
  small_cap_penalty: -10.0
  mega_cap_threshold_hkd: 500_000_000_000    # 500B
  mega_cap_penalty: -5.0

# -----------------------------------------------------------------------------
# L1.3 已盈利档: 盈利质量 tier multiplier (P1.2)
# -----------------------------------------------------------------------------
# 现有 5 子项 (rev/gm/roe/nd/fcf) 各自封顶, 但 ROE>15% AND 持续 FCF 3y 的复利型公司
# 跟刚扭亏的"假盈利"在 raw score 上可以差不多 — 加 tier multiplier 把定性差距落地.
#
# 仅作用于 CompanyType.PROFITABLE; biotech / 18C 走 _score_l1_3_biotech / _18c, 不受影响.
#
# 实证依据 (2018-2025 港股已盈利档主板 IPO d30 vs ROE/FCF tier):
#   持续盈利 (ROE_3y≥15% AND FCF 3 年都正)  60d mean +21%, win 67%
#   moderate (其它)                         60d mean +13%, win 51%
#   刚转盈 (FCF 0~1 年)                     60d mean -3%,  win 38%
layer1_profitability_tier:
  enabled: true
  persistent_roe_threshold: 0.15
  persistent_fcf_min_years: 3
  persistent_multiplier: 1.10
  fresh_fcf_max_years: 1
  fresh_multiplier: 0.90

# -----------------------------------------------------------------------------
# L1.3 18A 档: 子领域 multiplier (P1.3)
# -----------------------------------------------------------------------------
# 当前 _score_l1_3_biotech 4 子项 (phase/pipeline/runway/bd) 把所有 18A 一视同仁,
# 但子领域历史 d30/60d 表现差距悬殊 — 创新药 II→III 跨越是核心驱动,
# 器械被 NMPA 政策上限压, 细胞基因有大幅 narrative 上行, 诊断同质化拖估值.
#
# 仅作用于 CompanyType.BIOTECH_18A; profitable / 18C 不受影响.
# subdomain=None / unknown → multiplier=1.0 不动 (历史无此字段的 row 向后兼容).
#
# 实证依据 (2018-2025 港股 18A IPO d30 by subdomain, 样本 ~80):
#   innovative_drug 60d mean +18%, win 58% (基线)
#   cell_gene       60d mean +28%, win 65% (P/B 高估值溢价)
#   medical_device  60d mean +5%,  win 42% (NMPA 周期长)
#   diagnostics     60d mean -2%,  win 38% (IVD 同质化)
layer1_biotech_subdomain:
  enabled: true
  multipliers:
    innovative_drug: 1.00
    medical_device: 0.90
    cell_gene: 1.10
    diagnostics: 0.85
