name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:  # 手动触发

# 同 ref 的并发运行只保留最新一次, 节省 CI 配额
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install runtime + dev deps
        # iFindPy 不在 PyPI, CI 中跳过 (相关测试不依赖 iFinD live 调用)
        run: |
          python -m pip install --upgrade pip
          # 不直接装 requirements.txt (含 akshare 太重), 装 CI 必须的子集
          pip install "pandas>=2.0" "numpy>=1.24" "pyyaml>=6.0" "jinja2>=3.1" "pytest>=7.0" pytest-cov

      - name: Show env
        run: |
          python --version
          pip list | grep -E "pytest|pyyaml|numpy|pandas" || true

      - name: Run pytest with coverage
        run: |
          python -m pytest \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing:skip-covered \
            -ra

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python }}
          path: coverage.xml
          if-no-files-found: warn

  lint:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: pre-commit-${{ runner.os }}-

      - name: Run pre-commit
        # CI 上跑全仓; 非 commit 阶段, 只跑标记 stage=pre-commit 的 hooks
        # mypy 默认 stage=manual, CI 不阻塞 (与 .pre-commit-config.yaml 一致)
        run: pre-commit run --all-files --show-diff-on-failure
