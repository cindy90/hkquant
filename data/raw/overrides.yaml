# =============================================================================
# raw/overrides.yaml — 字段级人工修正
# =============================================================================
#
# 目的:
#   raw iFinD CSV 偶尔有错误 (typo / 字段错位 / -- 占位), 这里是唯一的人工修正
#   入口. ETL 在 load_to_db 之前会先 apply_overrides(), 让原始 CSV 可信任为
#   "原始档", 而 DB 状态可由 (raw + overrides) 完全重建.
#
# 结构:
#   ipo_info:
#     <stock_code>:
#       <field_name>: <value>           # 用语义列名 (见 field_mappings.P05310_IPO_INFO)
#       _reason: <短描述>                # 必填: 为什么需要 override
#       _source: <来源URL或人>           # 必填: 来源
#
# 适用字段 (语义名):
#   listing_date, pricing_date, offer_price_hkd, offer_price_high,
#   offer_price_low, offering_size_hkd, intl_oversub, public_oversub,
#   cornerstone_coverage, total_offer_shares, listing_chapter
#
# 同样支持 cornerstones (按 (stock_code, cornerstone_name) 复合键)
# =============================================================================

ipo_info:
  # ---------------------------------------------------------------------------
  # 数据矛盾: iFinD CSV 中 listing_date typo 为 2023-01-09, 应为 2024-01-09
  # ---------------------------------------------------------------------------
  "2453.HK":
    listing_date: "2024-01-09"
    _reason: "raw CSV listing_date=2023-01-09 是 typo (定价日 2023-12-29, 上市日不可能在定价前 11 个月). 同行 p05310_f034=2024-01-09 印证."
    _source: "raw CSV self-consistency: pricing_date(f028)=2023-12-29 + 招股截止后正常 6-10 工作日上市"

  # ---------------------------------------------------------------------------
  # listing_date 在 raw CSV 为 '--', 通过招股书或 HKEX 公告补齐
  # ---------------------------------------------------------------------------
