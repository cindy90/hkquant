    comparable: 0.20
    industry: 0.10

  "18A":
    milestones: 0.45
    pre_ipo_anchor: 0.25
    comparable: 0.20
    industry: 0.10

  "MB-TECH":
    comparable: 0.35
    dcf: 0.35
    pre_ipo_anchor: 0.20
    industry: 0.10

  "AH":
