# Ensemble weights by ListingType. Initial Phase 4 defaults — calibrated in Phase 8.
# See PROJECT_SPEC.md §3.2 and ADR 0005 §2 (Regime Gate is applied AFTER weighting).
#
# Convention: weights for each listing_type must sum to 1.0 across applicable
# models; ensemble.py will renormalize across models that returned
# `applicable=True` so values are interpretable as proportions.

weights:
  "18C-COMM":
    comparable: 0.35
    dcf: 0.30
    pre_ipo_anchor: 0.20
    industry: 0.15

  "18C-PRE":
